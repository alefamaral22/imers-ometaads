# Onda 3 — Runner headless no Fly.io (SPEC §8 Onda 3 / §10, ADR 0001).
# App de placeholder do template: "meta-ads-agents". Sem serviço HTTP → nenhuma porta exposta.
app = "meta-ads-agents"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

# Sem [http_service] nem [[services]]: o runner não aceita conexões inbound. Ele só faz polling
# da fila e executa skills (comunicação entre planos só pelo banco — SPEC §1/§3).

# Volume persistente para as credenciais OAuth do Claude Code (sobrevive a deploys/reinícios).
# Crie com: fly volumes create claude_oauth --region gru --size 1
[mounts]
  source = "claude_oauth"
  destination = "/root/.claude"

[env]
  TZ = "UTC"
  CLAUDE_CONFIG_DIR = "/root/.claude"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

# Segredos NÃO ficam aqui. Configure com `fly secrets set`:
#   SUPABASE_URL, SUPABASE_SECRET_KEY, OPENAI_API_KEY, CLAUDE_API_KEY
# Autenticação do Claude Code: `fly ssh console` e `claude login` (persistido no volume).
